name: Showcase (GitHub Pages)

# Builds the app in demo mode (DEMO_MODE=1 — fixture library, no Spotify
# credentials), captures real screenshots of the running UI with Playwright,
# assembles the showcase landing page and deploys it to GitHub Pages.
#
# One-time setup: repo Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm i --no-save playwright
          npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app in demo mode
        run: |
          DEMO_MODE=1 nohup npx next start -p 3000 > /tmp/next.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:3000/api/health && break
            sleep 1
          done
          curl -fs http://127.0.0.1:3000/api/health

      - name: Capture screenshots
        run: node scripts/showcase-screenshots.mjs site/screenshots
        env:
          BASE_URL: http://127.0.0.1:3000

      - name: Assemble site
        run: |
          cp showcase/index.html site/
          cp public/favicon.svg public/og-image.png site/

      - name: Show server log (debug aid)
        if: always()
        run: tail -50 /tmp/next.log || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
