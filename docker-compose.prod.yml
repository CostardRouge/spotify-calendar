# Home Lab stack (Dell OptiPlex) — optimized standalone image with healthcheck.
# Image is built & published by .github/workflows/docker-build.yml on every
# push to main, so this pulls from GHCR instead of building locally.
# If the GitHub repo/package is private, run once on the host:
#   docker login ghcr.io -u <github-username> -p <PAT with read:packages>
# Usage: make prod-pull && make prod-up   (or: docker compose -f docker-compose.prod.yml pull && up -d)
services:
  spotify-calendar:
    image: ghcr.io/costardrouge/spotify-calendar:latest
    container_name: spotify-calendar
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CACHE_DIR=/app/.cache
    volumes:
      - spotify-calendar-data:/app/.cache # persist the library cache across restarts
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  spotify-calendar-data:
